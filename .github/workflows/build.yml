name: Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    env:
      Solution_Path: KoenZomers.KeePass.OneDriveSync.sln

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: repo

      - name: Checkout OneDrive API dependency
        uses: actions/checkout@v4
        with:
          repository: KoenZomers/OneDriveAPI
          path: OneDriveAPI

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Install KeePass
        run: choco install keepass -y --no-progress

      - name: Resolve build properties
        id: props
        run: |
          $keePassExe = Get-ChildItem -Path 'C:\Program Files*','C:\ProgramData\chocolatey\lib' -Filter 'KeePass.exe' -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $keePassExe) {
            throw "KeePass.exe not found after installation"
          }
          "KeePassExePath=$($keePassExe.FullName)" >> $env:GITHUB_OUTPUT

      - name: Restore NuGet packages
        working-directory: repo
        run: nuget restore $env:Solution_Path

      - name: Build solution
        working-directory: repo
        run: >
          msbuild $env:Solution_Path /p:Configuration=Release /p:Platform="Any CPU" /m
          /p:KeePassExePath="${{ steps.props.outputs.KeePassExePath }}"

      - name: Upload PLGX artifact
        uses: actions/upload-artifact@v4
        with:
          name: KeeOneDriveSync-plgx
          path: repo\KeeOneDriveSync.plgx
